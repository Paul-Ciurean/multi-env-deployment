name: Deploy to Dev

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    outputs:
      changes: ${{ steps.set_output.outputs.changes }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init -reconfigure -upgrade \
            -backend-config="bucket=pc-terraform-backend-bucket" \
            -backend-config="key=environments/dev/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -detailed-exitcode \
            -var-file=environments/dev/variables.tfvars \
            -var="env=dev" \
            -var="region=us-east-1" \
            -out=tfplan

          echo "exitcode=$?" >> $GITHUB_OUTPUT

        continue-on-error: true

      - name: Set output safely
        id: set_output
        run: |
          EXITCODE=${{ steps.plan.outputs.exitcode }}

          if [ "$EXITCODE" = "2" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail on error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan

    if: needs.terraform-plan.outputs.changes == 'true'

    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init -reconfigure -upgrade \
            -backend-config="bucket=pc-terraform-backend-bucket" \
            -backend-config="key=environments/dev/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan