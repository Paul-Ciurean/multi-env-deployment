name: Deploy to Dev or Prod
on:
  push:
    branches: [ "main" ]
permissions:
  id-token: write
  contents: read

# env:
#   TF_REGION: us-east-1
#   TF_BACKEND_KEY_DEV: environments/dev/terraform.tfstate
#   TF_BACKEND_KEY_PROD: environments/prod/terraform.tfstate
#   TF_BACKEND_BUCKET_DEV: pc-terraform-backend-bucket
#   TF_BACKEND_BUCKET_PROD: pc-terraform-backend-bucket-prod
#   TF_VAR_FILE_DEV: environments/dev/variables.tfvars
#   TF_VAR_FILE_PROD: environments/prod/variables.tfvars

jobs:
  # ── DEV ──
  dev-terraform-plan:
    name: "[Dev] Terraform Plan"
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check_changes.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Terraform Init
        run: |
          terraform init -reconfigure -upgrade \
            -backend-config="bucket=${{ vars.TF_BACKEND_BUCKET_DEV }}" \
            -backend-config="key=${{ vars.TF_BACKEND_KEY_DEV }}" \
            -backend-config="region=${{ vars.TF_REGION }}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="${{ vars.TF_VAR_FILE_DEV }}" \
            -var="env=dev" \
            -var="region=${{ vars.TF_REGION }}" \
            -out=tfplan \
            -detailed-exitcode
        continue-on-error: true
      - name: Check for infrastructure changes
        id: check_changes
        run: |
          if [ "${{ steps.plan.outputs.exitcode }}" == "2" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Infrastructure changes detected."
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No infrastructure changes detected. Skipping approval and apply."
          fi
      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1
      - name: Upload plan artifact
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: tfplan

  dev-approval:
    name: "[Dev] Manual Approval"
    needs: dev-terraform-plan
    if: needs.dev-terraform-plan.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - run: echo "Approved for dev deploy"

  dev-terraform-apply:
    name: "[Dev] Terraform Apply"
    needs: [dev-terraform-plan, dev-approval]
    if: needs.dev-terraform-plan.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Terraform Init
        run: |
          terraform init -reconfigure -upgrade \
            -backend-config="bucket=${{ vars.TF_BACKEND_BUCKET_DEV }}" \
            -backend-config="key=${{ vars.TF_BACKEND_KEY_DEV }}" \
            -backend-config="region=${{ vars.TF_REGION }}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: .
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

